site_name: Viewer Documentation
site_description: Documentation and integration kit for the Viewer — a React + Three.js runtime for configurable, geometric SaaS products
site_url: https://ebjornson.github.io/viewer-docs/
repo_url: https://github.com/EBjornson/viewer-docs
repo_name: EBjornson/viewer-docs

# docs_dir is the existing /docs/ folder; mkdocs requires it be a child of where this config lives.
docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

extra_css:
  - stylesheets/extra.css

# `plugins:` is empty by default; mkdocs-material auto-enables the search plugin.
# Once we add a plugins list we have to re-include `search` explicitly or it
# gets disabled. Redirects let renamed/removed docs keep working at their old
# URL — add a new entry whenever you move or delete a doc. awesome-pages reads
# docs/.pages (synced from BPViewer) to build the sidebar nav from the
# filesystem with curated grouping/ordering — that's why this file no longer
# carries an explicit `nav:` block.
plugins:
  - search
  - redirects:
      redirect_maps:
        tester_quickstart.md: demo_walkthrough.md
  - awesome-pages

markdown_extensions:
  # Treat single newlines as <br> so the 3-line audience header blocks at the top of each doc render correctly.
  - nl2br
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

# Sidebar nav is filesystem-driven by mkdocs-awesome-pages-plugin reading
# docs/.pages, which is authored in BPViewer's main and carried here by the
# sync workflow. Edit BPViewer's docs/.pages (not this file) to change ordering,
# grouping, friendly titles, or to hide a doc with `not_in_nav:`.
