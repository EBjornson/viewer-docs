site_name: Viewer Documentation
site_description: Documentation and integration kit for the Viewer — a React + Three.js runtime for configurable, geometric SaaS products
site_url: https://ebjornson.github.io/viewer-docs/
repo_url: https://github.com/EBjornson/viewer-docs
repo_name: EBjornson/viewer-docs

# docs_dir is the existing /docs/ folder; mkdocs requires it be a child of where this config lives.
docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  # Treat single newlines as <br> so the 3-line audience header blocks at the top of each doc render correctly.
  - nl2br
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

# nav paths are relative to docs_dir (so "overview.md" not "docs/overview.md").
# The first item is what serves as the site's home page.
nav:
  - Overview: overview.md
  - Integration:
      - Integration Guide: integration_guide.md
      - Walkthrough: integration_walkthrough.md
      - Viewer Contract v1.7: viewer_contract_v1_7.md
      - DemoApp Reference: demoapp.md
  - Internals:
      - Architecture: architecture.md
      - Capture & Replay: capture_and_replay.md
  - Authoring:
      - Admin Authoring Guide: admin_authoring_guide.md
      - Model Authoring Guide: model_authoring_guide.md
      - Tester Quickstart: tester_quickstart.md
  - Reference:
      - Capabilities & Limits: capabilities_and_limits.md
      - Subscriber Materials Plan: subscriber_materials_plan.md
